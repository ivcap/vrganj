<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Prepoznavanje gljiva</title>

    <link rel="icon" href="ikona.png" type="image/png">
    <link rel="apple-touch-icon" href="ikona.png">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 15px;
        }

        /* TIPKE */
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            background: #2c3e50;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: #34495e;
            transform: scale(1.05);
        }

        /* STATUS */
        #status {
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }

        /* OKVIR KAMERE */
        #webcam-container {
            position: relative;
            padding: 15px;
            border-radius: 20px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-top: 10px;
        }

        /* NASLOV OKVIRA */
        #webcam-container::before {
            content: "🔍 Skener";
            position: absolute;
            top: -10px;
            left: 15px;
            background: #2c3e50;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 8px;
        }

        /* KAMERA */
        #webcam-container canvas {
            width: 320px !important;
            height: 320px !important;
            border-radius: 15px;
            border: 3px solid #2c3e50;
            display: block;
            margin: auto;
        }

        /* REZULTATI */
        #label-container {
            margin-top: 15px;
            text-align: center;
        }

        #label-container div {
            font-size: 20px;
            margin: 5px;
        }
    </style>
</head>

<body>

<h1>🍄 Koja je to gljiva?</h1>

<div class="buttons">
    <button onclick="init()">▶ Start</button>
    <button onclick="stopWebcam()">⛔ Stop</button>
</div>

<div id="status">Klikni Start za pokretanje kamere</div>

<div id="webcam-container"></div>
<div id="label-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
    const URL = "https://teachablemachine.withgoogle.com/models/mpYXq1TZg/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        document.getElementById("status").innerText = "Učitavanje modela...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        webcam = new tmImage.Webcam(320, 320, true);

        await webcam.setup({ facingMode: "environment" });
        await webcam.play();

        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.appendChild(document.createElement("div"));
        }

        document.getElementById("status").innerText = "Kamera radi ✔";
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);

        for (let i = 0; i < maxPredictions; i++) {

            const probability = (prediction[i].probability * 100).toFixed(0);

            const text =
                prediction[i].className + ": " + probability + "%";

            const element = labelContainer.childNodes[i];
            element.innerHTML = text;

            if (probability > 90) {
                element.style.color = "#2ecc71";
                element.style.fontWeight = "bold";
            } else {
                element.style.color = "#555";
                element.style.fontWeight = "normal";
            }
        }
    }

    function stopWebcam() {
        if (webcam) {
            webcam.stop();
            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("status").innerText = "Kamera ugašena ⛔";
        }
    }
</script>

</body>
</html>
