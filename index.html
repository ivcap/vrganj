<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>🍄 ML model za prepoznavanje gljiva</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e1e1e">

    <link rel="icon" href="ikona.png" type="image/png">
    <link rel="apple-touch-icon" href="ikona.png">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            margin: 0;
            padding: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;

            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            margin-bottom: 10px;
            text-align: center;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            background: #2ecc71;
            color: white;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #status {
            margin-bottom: 15px;
            font-weight: bold;
            text-align: center;
        }

        /* CAMERA CARD */
        #webcam-container {
            position: relative;
            padding: 15px;
            border-radius: 25px;
            background: #1f1f1f;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.2);
            overflow: hidden;
            transition: 0.3s;
        }

        /* CAMERA */
        #webcam-container canvas {
            width: 340px !important;
            height: 340px !important;
            border-radius: 18px;
            border: 3px solid #2ecc71;
            display: block;
        }

        /* SCAN LINE */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: rgba(46, 204, 113, 0.8);
            top: 0;
            left: 0;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% {
                top: 20px;
            }
            50% {
                top: 320px;
            }
            100% {
                top: 20px;
            }
        }

        /* RESULT */
        #label-container {
            margin-top: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        /* CONFIDENCE BAR */
        .confidence-wrapper {
            width: 320px;
            height: 25px;
            background: #2d3436;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 15px;
        }

        .confidence-bar {
            height: 100%;
            width: 0%;
            background: #2ecc71;
            transition: width 0.3s ease;
        }

        /* FOOTER WARNING */
        #footer-warning {
            margin-top: auto;
            padding-top: 40px;
            max-width: 500px;

            font-size: 13px;
            line-height: 1.6;

            text-align: center;

            color: #b2bec3;

            border-top: 1px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 600px) {
            #webcam-container canvas {
                width: 260px !important;
                height: 260px !important;
            }

            .confidence-wrapper {
                width: 260px;
            }
        }
    </style>
</head>

<body>

<h1>🍄 ML model za prepoznavanje gljiva</h1>

<div class="buttons">
    <button id="startBtn" onclick="init()"> Start</button>
    <button onclick="stopWebcam()"> Stop</button>
</div>

<div id="status">Klikni Start za pokretanje kamere</div>

<div id="webcam-container">
    <div class="scan-line"></div>
</div>

<div id="label-container">Čekam kameru...</div>

<div class="confidence-wrapper">
    <div class="confidence-bar" id="confidence-bar"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
    const URL = "https://teachablemachine.withgoogle.com/models/-amSF8ARC/";

    let model, webcam;
    let running = false;

    async function init() {

        document.getElementById("startBtn").disabled = true;

        document.getElementById("status").innerText =
            "Učitavanje ML modela...";

        document.getElementById("webcam-container").style.boxShadow =
            "0 0 30px rgba(46, 204, 113, 0.2)";

        running = true;

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);

        webcam = new tmImage.Webcam(340, 340, true);

        await webcam.setup({ facingMode: "environment" });
        await webcam.play();

        document.getElementById("webcam-container").innerHTML =
            '<div class="scan-line"></div>';

        document.getElementById("webcam-container").appendChild(webcam.canvas);

        document.getElementById("status").innerText =
            "ML analiza aktivna ✔";

        window.requestAnimationFrame(loop);
    }

    async function loop() {

        if (!running) return;

        webcam.update();

        await predict();

        window.requestAnimationFrame(loop);
    }

    async function predict() {

        const prediction = await model.predict(webcam.canvas);

        let best = prediction.reduce((a, b) =>
            a.probability > b.probability ? a : b
        );

        const probability = (best.probability * 100).toFixed(0);

        // Ako ML model nije siguran
        if (best.probability < 0.2) {

            document.getElementById("label-container").innerHTML =
                "🤔 Nisam siguran što je ovo";

            document.getElementById("confidence-bar").style.width = "0%";

            return;
        }

        // Prikaz rezultata
        document.getElementById("label-container").innerHTML =
            `${best.className} - ${probability}%`;

        document.getElementById("confidence-bar").style.width =
            probability + "%";
    }

    function stopWebcam() {

        running = false;

        if (webcam) {
            webcam.stop();
        }

        document.getElementById("webcam-container").innerHTML =
            '<div class="scan-line"></div>';

        document.getElementById("label-container").innerHTML =
            "Kamera ugašena ⛔";

        document.getElementById("confidence-bar").style.width = "0%";

        document.getElementById("status").innerText =
            "Kamera zaustavljena";

        document.getElementById("startBtn").disabled = false;
    }
</script>

<div id="footer-warning">
⚠ Ova aplikacija služi isključivo u edukativne svrhe.
Rezultati ML modela nisu 100% točni i ne smiju se koristiti
za određivanje jestivosti gljiva.
</div>

</body>
</html>
