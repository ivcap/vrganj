<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Prepoznavanje gljiva</title>

    <!-- MOBILE FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="ikona.png" type="image/png">
    <link rel="apple-touch-icon" href="ikona.png">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            background: #2c3e50;
            color: white;

            transition: all 0.2s ease;
        }

        button:hover {
            background: #34495e;
            transform: scale(1.05);
        }

        #status {
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        #warning {
            color: red;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* OKVIR KAMERE */
        #webcam-container {
            position: relative;
            padding: 15px;
            border-radius: 20px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-top: 10px;

            transition: 0.3s;
        }

        #webcam-container::before {
            content: "🍄 AI analiza";
            position: absolute;
            top: -10px;
            left: 15px;
            background: #2c3e50;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 8px;
        }

        #webcam-container canvas {
            width: 320px !important;
            height: 320px !important;
            border-radius: 15px;
            border: 3px solid #2c3e50;
            display: block;
            margin: auto;
        }

        #label-container {
            margin-top: 15px;
            text-align: center;
        }

        #label-container div {
            font-size: 20px;
            margin: 5px;
        }

        @media (max-width: 600px) {
            #webcam-container canvas {
                width: 260px !important;
                height: 260px !important;
            }
        }
    </style>
</head>

<body>

<h1>🍄 Koja je to gljiva?</h1>

<div class="buttons">
    <button onclick="init()">▶ Start</button>
    <button onclick="stopWebcam()">⛔ Stop</button>
</div>

<div id="status">Klikni Start za pokretanje kamere</div>
<div id="warning">⚠ Ovo je samo za igru – ne koristiti za branje gljiva</div>

<div id="webcam-container"></div>
<div id="label-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
    const URL = "https://teachablemachine.withgoogle.com/models/mpYXq1TZg/";

    let model, webcam, labelContainer, maxPredictions;
    let running = false;

    async function init() {
        document.getElementById("status").innerText = "Učitavanje modela...";

        running = true;

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        webcam = new tmImage.Webcam(320, 320, true);

        await webcam.setup({ facingMode: "environment" });
        await webcam.play();

        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.appendChild(document.createElement("div"));
        }

        document.getElementById("status").innerText = "Kamera radi ✔";
    }

    async function loop() {
        if (!running) return;

        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);

        // TOP RESULT ONLY
        let best = prediction.reduce((a, b) =>
            a.probability > b.probability ? a : b
        );

        labelContainer.innerHTML =
            best.className + " - " + (best.probability * 100).toFixed(0) + "%";

        if (best.probability > 0.9) {
            labelContainer.style.color = "#2ecc71";
            labelContainer.style.fontWeight = "bold";
        } else {
            labelContainer.style.color = "#555";
            labelContainer.style.fontWeight = "normal";
        }
    }

    function stopWebcam() {
        running = false;

        if (webcam) {
            webcam.stop();
            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("status").innerText = "Kamera ugašena ⛔";
        }
    }
</script>

</body>
</html>
